spring:
  datasource:
    url: jdbc:h2:mem:wedent_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  security:
    jwt:
      secret: test-secret-test-secret-test-secret-test-secret-1234567890
      access-token-expiration-minutes: 60
      issuer: wedent-clinic-test
    public-paths:
      - /api/auth/**
